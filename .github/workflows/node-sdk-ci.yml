name: "@hearth/node SDK CI"

# §9 — CI for the Node.js server-side SDK.
# Runs on every PR or push touching sdks/node/.
# Gates: typecheck, tests, ≥80% line coverage.

on:
  pull_request:
    branches: [main]
    paths:
      - "sdks/node/**"
      - ".github/workflows/node-sdk-ci.yml"
  push:
    branches: [main]
    paths:
      - "sdks/node/**"
      - ".github/workflows/node-sdk-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node-sdk:
    name: "@hearth/node — typecheck + test + coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdks/node

    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: sdks/node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage (≥80% line gate)
        run: npm test

      - name: Upload coverage report
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: node-sdk-coverage
          path: sdks/node/coverage/
          retention-days: 7
