name: CI

# Quality gate for every PR into main and every push to main.
# Runs the same checks contributors run locally via `make check`,
# plus the Tailwind and proto regeneration drift checks.
#
# This workflow is the prerequisite gate for Dependabot auto-merge
# (see HEA-275 / .github/workflows/dependabot-automerge.yml): without
# a required CI status check, dependency bumps could be auto-merged
# without ever verifying the build still compiles, passes clippy, or
# passes tests.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs to save minutes, but always finish runs
  # on main so we never leave a "last-known-good" gap on the trunk.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: make check + css-check + proto-check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # proto-check / proto-breaking compare against main via the
          # local .git refs; need full history (not the default shallow
          # checkout) so the comparison works for PR branches.
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-14
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cargo build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@b550161ef8a7bc4f2a671c0b03a18ac9ccedea1e # v2.79.1
        with:
          tool: cargo-nextest

      - name: Install Tailwind standalone CLI
        run: make tailwind-install

      - name: make test-quality (block false-confidence test patterns — HEA-571)
        run: make test-quality

      - name: make check (clippy -D warnings + fmt --check + nextest --workspace)
        run: make check

      - name: make css-check (rebuild Tailwind and fail if app.css drifts)
        run: make css-check

      - name: make proto-check (regenerate SDKs and fail if generated code drifts)
        run: make proto-check

