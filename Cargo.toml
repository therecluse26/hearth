[package]
name = "hearth"
version = "0.1.0"
edition = "2021"
description = "Purpose-built identity database: authentication, authorization, and session management"
license = "Apache-2.0"
rust-version = "1.75"

[lib]
name = "hearth"
path = "src/lib.rs"

[[bin]]
name = "hearth"
path = "src/main.rs"

[dependencies]
arc-swap = "1"
crc32fast = "1"
crossbeam-epoch = "0.9"
memmap2 = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }
zeroize = { version = "1", features = ["derive"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }

# [[bench]]
# name = "benchmarks"
# harness = false

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
