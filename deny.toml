[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
copyleft = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
