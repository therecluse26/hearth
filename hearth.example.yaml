# Hearth example configuration.
#
# Usage:
#   cp hearth.example.yaml hearth.yaml      # auto-detected in CWD
#   ./target/release/hearth serve           # uses hearth.yaml
# or:
#   ./target/release/hearth serve -c /path/to/config.yaml
#
# Every section is optional. Any field you omit falls back to the default
# shown in the comment. An empty file (`{}`) is a valid, production-safe
# configuration.
#
# Environment variable substitution is supported anywhere a string value
# appears: use dollar-sign + braces around the variable name (see the README
# "Configuration" section for the exact syntax). A referenced variable that
# is not set is a startup error — there is no silent fallback.

server:
  bind_address: "127.0.0.1"   # default: 127.0.0.1
  port: 8420                  # default: 8420

  # TLS is optional. If you set one of cert/key, you MUST set both.
  # Enabling TLS also spawns an HTTP→HTTPS redirect listener on `port - 1`
  # (or port 80 when `port: 443`). Send SIGHUP to reload cert + key.
  # tls_cert_path: "./tls/server.crt"
  # tls_key_path:  "./tls/server.key"

  # mTLS: require clients to present a certificate signed by this CA.
  # `tls_require_client_cert: true` requires `tls_client_ca_path` to be set.
  # tls_client_ca_path: "./tls/clients-ca.crt"
  # tls_require_client_cert: false

storage:
  data_dir: "./data"                      # WAL + SST files live here
  wal_max_size_bytes: 268435456           # 256 MiB — WAL rotation threshold
  memtable_flush_bytes: 67108864          # 64 MiB  — memtable→SST flush threshold
  hot_tier_capacity: 10000                # entries cached in the hot tier
  fsync: true                             # MUST be true in production; dev mode disables this
  # compaction:                            # optional — all fields have defaults shown below
  #   enabled: true                       # whether background SST compaction runs
  #   interval_secs: 3600                 # seconds between compaction sweeps
  #   min_sst_count: 3                    # compact only when SST count >= this threshold

observability:
  log_level: "info"      # trace | debug | info | warn | error
  log_format: "text"     # text | json

  # Optional: export distributed traces via OpenTelemetry OTLP.
  # When omitted, no traces are exported and there is zero overhead.
  #
  # otlp:
  #   protocol: grpc         # grpc (default, port 4317) | http (port 4318)
  #   endpoint: "http://localhost:4317"   # default shown; override for your collector
  #   service_name: "hearth"             # reported as service.name in every span
  #   headers:                           # optional auth headers for managed collectors
  #     Authorization: "Bearer <token>"

operational:
  request_timeout_secs: 30
  shutdown_timeout_secs: 10
  max_connections: 1024
  queue_depth: 4096

# --- Branding (global) ------------------------------------------------------
# Controls the product name and logo shown across the UI and email templates.
# When omitted, "Hearth" and the built-in Hearth logo are used everywhere.

# branding:
#   product_name: "Acme Corp"     # default: "Hearth" — shown in logo alt text and emails
#
#   # Remote URL — used directly in <img src="..."> for both UI and emails.
#   logo_url: "https://example.com/logo.png"
#
#   # Local file path — read at startup, served via /ui/static/custom-logo
#   # in the web UI; SVGs are inlined directly in emails.
#   # Supported formats: .svg, .png, .jpg/.jpeg
#   # logo_url: "/opt/hearth/branding/logo.svg"
#
#   # Named UI theme. Choices: ember (default dark) | ocean | midnight | forest | cloud | slate
#   # cloud and slate are light themes; the rest are dark themes.
#   # theme: ocean
#
#   # Optional path to a CSS file appended after the named theme. Use this to
#   # override --ht-* CSS variables or add custom rules without forking a theme.
#   # custom_css: /etc/hearth/brand.css

email:
  # Outbound mail transport for verification and transactional mail.
  # Supported: log | smtp | sendgrid | postmark | mailgun | mailtrap
  transport: log                    # default: log (no network I/O)

  # Sender address (From: header). Required for all transports except `log`.
  # from: "Hearth <hearth@example.com>"

  # --- Provider blocks (uncomment the one matching your transport) ----------

  # smtp:
  #   host: "smtp.example.com"
  #   port: 587                     # 25, 465, 587, or 1025 (Mailpit)
  #   encryption: starttls          # none | starttls | tls (default: starttls)
  #   username: "${SMTP_USERNAME}"
  #   password: "${SMTP_PASSWORD}"

  # sendgrid:
  #   api_key: "${SENDGRID_API_KEY}"

  # postmark:
  #   server_token: "${POSTMARK_SERVER_TOKEN}"

  # mailgun:
  #   api_key: "${MAILGUN_API_KEY}"
  #   domain: "mg.example.com"
  #   region: us                    # us | eu (default: us)

  # mailtrap:
  #   api_key: "${MAILTRAP_API_KEY}"

  # --- Branding (applied to all outbound emails) ----------------------------
  # Email-specific overrides. product_name and logo_url come from the
  # global `branding:` section above. Per-realm overrides are stored in
  # RealmConfig.email_branding.

  # branding:
  #   accent_color: "#4F46E5"              # default: "#E85D04"
  #   support_email: "support@example.com"
  #   custom_footer_text: "© 2026 Acme Corp. All rights reserved."

  # --- Custom templates -----------------------------------------------------
  # Directory containing Tera templates that override the compiled defaults.
  # templates_dir: "./templates/email"

# --- OIDC / OAuth 2.0 -------------------------------------------------------
# Controls the OIDC Discovery document and authorization code behaviour.

# oidc:
#   issuer: "https://auth.example.com"   # default: "https://hearth.local"
#   authorization_code_ttl: "10m"        # default: 10 minutes
#   enforce_nonces: false                # default: false

# --- Token issuance ---------------------------------------------------------
# Controls JWT claims and expiration. `token.issuer` defaults to `oidc.issuer`
# when omitted, so you only need to set it here if they differ.

# token:
#   issuer: "https://auth.example.com"   # default: oidc.issuer or "hearth"
#   audience: "hearth"                   # default: "hearth"
#   access_token_ttl: "15m"             # default: 15 minutes
#   refresh_token_ttl: "7d"             # default: 7 days

# --- Auth defaults (global) -------------------------------------------------
# These apply to all realms unless overridden per-realm below.

# auth:
#   session_ttl: "24h"              # duration: 30s, 5m, 8h, 1d
#   password_memory_cost: 65536     # Argon2id memory parameter (KiB)
#   password_time_cost: 3           # Argon2id time parameter (iterations)
#   mfa_required: false             # require MFA for all users (global default)
#   passkey_requires_mfa: false     # enforce TOTP even after passkey login (global default)
#   audit_log_retention: "365d"     # how long audit events are retained (default: forever)
#                                   # SOC 2 Type II typically requires 90d; ISO 27001 often 1y

# --- Realms ----------------------------------------------------------------
# Realms are managed declaratively in this file. On startup, Hearth
# reconciles what's declared here with what's in storage:
#
#   - YAML entry not in storage     → created
#   - YAML entry in storage         → config updated if changed
#   - Storage realm not in YAML    → archived (soft-deleted)
#
# Archived realms appear in the Admin UI with an "Archived" badge and
# can be permanently deleted from there.
#
# If the `realms` key is OMITTED entirely:
#   - No realms in storage → a "default" realm is auto-created
#   - Realms already exist → left untouched (backward compatibility)
#
# Single-realm (most deployments): omit `realms` entirely and let
# Hearth auto-create "default" using the global `auth` settings above.

# --- Single-realm example (just omit the realms key) ---
# (nothing to add — Hearth creates "default" automatically)

# --- Multi-realm example ---
# realms:
#   customer-portal:
#     session_ttl: "12h"                # overrides global auth.session_ttl
#     email:
#       branding:
#         accent_color: "#2563EB"
#     web:
#       theme: cloud                    # light theme for this realm
#       custom_css: /etc/hearth/customer-portal.css   # optional realm CSS
#     auth:
#       mfa_required: true              # require MFA for all users
#       passkey_requires_mfa: false     # enforce TOTP even after passkey login (regulated environments)
#       mfa_methods:                    # allowed MFA methods
#         - totp
#         - webauthn
#       allowed_auth_methods:           # allowed login methods
#         - password
#         - magic_link
#         - passkey
#       password_policy:
#         min_length: 12
#         require_uppercase: true
#         require_number: true
#         require_special: false
#       token:
#         access_token_ttl: "30m"       # per-realm token TTL override
#         refresh_token_ttl: "14d"
#       rate_limit:
#         max_failed_logins: 5
#         lockout_duration: "15m"
#
#   internal-tools:
#     session_ttl: "8h"
#     password_memory_cost: 131072      # stricter for internal use
#     web:
#       theme: midnight                 # violet/purple dark theme
#     organizations:
#       acme-corp:
#         name: "Acme Corporation"
#         description: "Main enterprise customer"
#         config:
#           max_members: 500
#       beta-testers:
#         name: "Beta Testers"
#         description: "Early access program"
#     applications:
#       dashboard:
#         name: "Internal Dashboard"
#         redirect_uris:
#           - "https://dashboard.internal.example.com/callback"
#         grant_types:
#           - authorization_code
#           - refresh_token
#       api-service:
#         name: "API Service"
#         confidential: true
#         client_secret: "${INTERNAL_API_SECRET}"
#         grant_types:
#           - client_credentials
#
#     # --- RBAC: permissions, roles, and scope bundles ---------------------
#     # Hearth seeds a baseline set on every realm: permissions
#     # (hearth.admin, realm.{read,write,admin}, org.{read,write,admin,billing},
#     # user.{read,write,impersonate}) and roles (realm.admin, realm.member,
#     # org.member → org.admin → org.owner, with org.* scoped to organizations).
#     # The blocks below ADD to the seed set; declared names that collide with
#     # seed names override the seed metadata for that realm.
#     #
#     # Every permission referenced by a role MUST be declared in the
#     # `permissions:` list (or be a seed permission); this is enforced at
#     # startup. Each permission needs a unique `name` and a `display_name`.
#
#     permissions:
#       - name: billing.read
#         display_name: "Read billing"
#         description: "View invoices, plan, and payment history."
#         category: billing
#       - name: billing.write
#         display_name: "Manage billing"
#         description: "Update payment methods, plan, and tax info."
#         category: billing
#       - name: reports.export
#         display_name: "Export reports"
#         description: "Download CSV / PDF exports of analytics reports."
#         category: analytics
#
#     roles:
#       # Realm-scoped role: granted directly on the realm.
#       - name: support.agent
#         description: "Read-only access for customer support staff."
#         scope_kind: realm           # realm | organization | any (default: realm)
#         permissions:
#           - user.read
#           - org.read
#           - reports.export
#
#       # Organization-scoped role: assignable to a user within a single org.
#       - name: org.billing_admin
#         description: "Manages billing for one organization."
#         scope_kind: organization
#         permissions:
#           - billing.read
#           - billing.write
#         parents:
#           - org.admin               # inherits org.write + org.admin (seed role)
#
#     # Scope bundles map an OAuth scope string to a set of permissions.
#     # Bundle names use ':' separators (no '.'). The seed scope map already
#     # provides `openid`, `profile`, `email`, `admin`, and `org`.
#     scopes:
#       - name: billing:manage
#         display_name: "Billing management"
#         description: "Read and write billing data."
#         permissions:
#           - billing.read
#           - billing.write
#
#     # YAML-declared groups — created at startup, updated if drifted.
#     groups:
#       - name: Engineering
#         slug: engineering
#         description: "All members of the engineering department."
#       - name: Platform Team
#         slug: platform
#         description: "Platform infrastructure engineers."

onboarding:
  # enabled: true  # set to false to permanently disable the /ui/setup flow
  # base_url: "https://auth.example.com"  # used in the setup URL logged at startup
  # notification_email: ops@example.com   # receives the setup URL on first boot (requires SMTP)
