syntax = "proto3";

package hearth.identity.v1;

option go_package = "github.com/hearthdb/hearth/sdks/go/generated/identity/v1;identityv1";

// The lifecycle status of a user account.
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_DISABLED = 2;
  USER_STATUS_PENDING_VERIFICATION = 3;
}

// The lifecycle status of a realm.
enum RealmStatus {
  REALM_STATUS_UNSPECIFIED = 0;
  REALM_STATUS_ACTIVE = 1;
  REALM_STATUS_SUSPENDED = 2;
}

// A user record within a realm.
message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  UserStatus status = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

// An authentication session bound to a user.
message Session {
  string id = 1;
  string user_id = 2;
  int64 created_at = 3;
  int64 expires_at = 4;
  int64 last_refreshed_at = 5;
}

// Per-realm configuration overrides.
message RealmConfig {
  optional int64 session_ttl_micros = 1;
  optional uint32 password_memory_cost = 2;
  optional uint32 password_time_cost = 3;
}

// A realm record.
message Realm {
  string id = 1;
  string name = 2;
  RealmStatus status = 3;
  RealmConfig config = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

// Request to create a new user.
message CreateUserRequest {
  string email = 1;
  string display_name = 2;
}

// Request to update an existing user.
message UpdateUserRequest {
  optional string email = 1;
  optional string display_name = 2;
  optional UserStatus status = 3;
}

// Request to create a new realm.
message CreateRealmRequest {
  string name = 1;
  optional RealmConfig config = 2;
}

// Request to update an existing realm.
message UpdateRealmRequest {
  optional string name = 1;
  optional RealmStatus status = 2;
  optional RealmConfig config = 3;
}

// A cursor-based page of users.
message UserPage {
  repeated User items = 1;
  optional string next_cursor = 2;
}

// A cursor-based page of realms.
message RealmPage {
  repeated Realm items = 1;
  optional string next_cursor = 2;
}

// A single entry in a bulk operation result.
message BulkResultEntry {
  uint32 index = 1;
  bool success = 2;
  // On success: the created/modified resource serialized as JSON.
  optional User user = 3;
  // On failure: error description.
  optional string error = 4;
}

// Result of a bulk operation.
message BulkResult {
  repeated BulkResultEntry results = 1;
}

// ---------------------------------------------------------------------------
// Organizations
// ---------------------------------------------------------------------------

// The lifecycle status of an organization.
enum OrganizationStatus {
  ORGANIZATION_STATUS_UNSPECIFIED = 0;
  ORGANIZATION_STATUS_ACTIVE = 1;
  ORGANIZATION_STATUS_SUSPENDED = 2;
}

// An organization (B2B customer group) within a realm.
message Organization {
  string id = 1;
  string realm_id = 2;
  string slug = 3;
  string display_name = 4;
  OrganizationStatus status = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  optional uint32 member_limit = 8;
}

// Request to create a new organization.
message CreateOrganizationRequest {
  string slug = 1;
  string display_name = 2;
  optional uint32 member_limit = 3;
}

// Request to update an existing organization.
message UpdateOrganizationRequest {
  optional string slug = 1;
  optional string display_name = 2;
  optional OrganizationStatus status = 3;
  optional uint32 member_limit = 4;
}

// A cursor-based page of organizations.
message OrganizationPage {
  repeated Organization items = 1;
  optional string next_cursor = 2;
}

// ---------------------------------------------------------------------------
// Request wrappers for admin RPCs
// ---------------------------------------------------------------------------

// Request to fetch a user by id.
message GetUserRequest { string id = 1; }

// Request to delete a user by id.
message DeleteUserRequest { string id = 1; }

// Request to list users with optional pagination.
message ListUsersRequest {
  optional string cursor = 1;
  optional uint32 limit = 2;
}

// Wraps an UpdateUserRequest with the target id.
message UpdateUserCall {
  string id = 1;
  UpdateUserRequest body = 2;
}

// Request to list realms.
message ListRealmsRequest {
  optional string cursor = 1;
  optional uint32 limit = 2;
}

// Request to fetch a realm by id.
message GetRealmRequest { string id = 1; }

// Request to delete a realm by id.
message DeleteRealmRequest { string id = 1; }

// Wraps an UpdateRealmRequest with the target id.
message UpdateRealmCall {
  string id = 1;
  UpdateRealmRequest body = 2;
}

// Request to list organizations.
message ListOrganizationsRequest {
  optional string cursor = 1;
  optional uint32 limit = 2;
}

// Request to fetch an organization by id.
message GetOrganizationRequest { string id = 1; }

// Request to delete an organization by id.
message DeleteOrganizationRequest { string id = 1; }

// Wraps an UpdateOrganizationRequest with the target id.
message UpdateOrganizationCall {
  string id = 1;
  UpdateOrganizationRequest body = 2;
}

// Empty response type for delete RPCs.
message Empty {}

// ---------------------------------------------------------------------------
// Admin service — realm context is supplied via the `x-realm-id` request
// metadata, authenticated via the admin interceptor (bearer token + Zanzibar
// admin tuple). Rate-limited to 100 req/min per admin user, shared with the
// REST admin surface.
// ---------------------------------------------------------------------------

service IdentityAdminService {
  // Users
  rpc ListUsers(ListUsersRequest) returns (UserPage);
  rpc GetUser(GetUserRequest) returns (User);
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc UpdateUser(UpdateUserCall) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (Empty);

  // Realms — operate against the system realm (mutations require admin in
  // the system realm). `x-realm-id` metadata is ignored for these RPCs.
  rpc ListRealms(ListRealmsRequest) returns (RealmPage);
  rpc GetRealm(GetRealmRequest) returns (Realm);
  rpc CreateRealm(CreateRealmRequest) returns (Realm);
  rpc UpdateRealm(UpdateRealmCall) returns (Realm);
  rpc DeleteRealm(DeleteRealmRequest) returns (Empty);

  // Organizations
  rpc ListOrganizations(ListOrganizationsRequest) returns (OrganizationPage);
  rpc GetOrganization(GetOrganizationRequest) returns (Organization);
  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization);
  rpc UpdateOrganization(UpdateOrganizationCall) returns (Organization);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (Empty);
}
