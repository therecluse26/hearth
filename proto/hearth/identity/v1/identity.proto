syntax = "proto3";

package hearth.identity.v1;

option go_package = "github.com/hearthdb/hearth/sdks/go/generated/identity/v1;identityv1";

// The lifecycle status of a user account.
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_DISABLED = 2;
  USER_STATUS_PENDING_VERIFICATION = 3;
}

// The lifecycle status of a tenant.
enum TenantStatus {
  TENANT_STATUS_UNSPECIFIED = 0;
  TENANT_STATUS_ACTIVE = 1;
  TENANT_STATUS_SUSPENDED = 2;
}

// A user record within a tenant.
message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  UserStatus status = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

// An authentication session bound to a user.
message Session {
  string id = 1;
  string user_id = 2;
  int64 created_at = 3;
  int64 expires_at = 4;
  int64 last_refreshed_at = 5;
}

// Per-tenant configuration overrides.
message TenantConfig {
  optional int64 session_ttl_micros = 1;
  optional uint32 password_memory_cost = 2;
  optional uint32 password_time_cost = 3;
}

// A tenant record.
message Tenant {
  string id = 1;
  string name = 2;
  TenantStatus status = 3;
  TenantConfig config = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

// Request to create a new user.
message CreateUserRequest {
  string email = 1;
  string display_name = 2;
}

// Request to update an existing user.
message UpdateUserRequest {
  optional string email = 1;
  optional string display_name = 2;
  optional UserStatus status = 3;
}

// Request to create a new tenant.
message CreateTenantRequest {
  string name = 1;
  optional TenantConfig config = 2;
}

// Request to update an existing tenant.
message UpdateTenantRequest {
  optional string name = 1;
  optional TenantStatus status = 2;
  optional TenantConfig config = 3;
}

// A cursor-based page of users.
message UserPage {
  repeated User items = 1;
  optional string next_cursor = 2;
}

// A cursor-based page of tenants.
message TenantPage {
  repeated Tenant items = 1;
  optional string next_cursor = 2;
}

// A single entry in a bulk operation result.
message BulkResultEntry {
  uint32 index = 1;
  bool success = 2;
  // On success: the created/modified resource serialized as JSON.
  optional User user = 3;
  // On failure: error description.
  optional string error = 4;
}

// Result of a bulk operation.
message BulkResult {
  repeated BulkResultEntry results = 1;
}
