syntax = "proto3";

package hearth.events.v1;

option go_package = "github.com/hearthdb/hearth/sdks/go/generated/events/v1;eventsv1";

// Categories of security-critical actions recorded in the audit log.
enum AuditAction {
  AUDIT_ACTION_UNSPECIFIED = 0;
  AUDIT_ACTION_USER_CREATED = 1;
  AUDIT_ACTION_USER_UPDATED = 2;
  AUDIT_ACTION_USER_DELETED = 3;
  AUDIT_ACTION_CREDENTIAL_SET = 4;
  AUDIT_ACTION_CREDENTIAL_CHANGED = 5;
  AUDIT_ACTION_CREDENTIAL_VERIFIED = 6;
  AUDIT_ACTION_SESSION_CREATED = 7;
  AUDIT_ACTION_SESSION_REVOKED = 8;
  AUDIT_ACTION_TOKEN_ISSUED = 9;
  AUDIT_ACTION_TOKEN_REFRESHED = 10;
  AUDIT_ACTION_REALM_CREATED = 11;
  AUDIT_ACTION_REALM_UPDATED = 12;
  AUDIT_ACTION_REALM_DELETED = 13;
  AUDIT_ACTION_CLIENT_REGISTERED = 14;
  AUDIT_ACTION_AUTHORIZATION_CODE_ISSUED = 15;
  AUDIT_ACTION_AUTHORIZATION_CODE_EXCHANGED = 16;
  AUDIT_ACTION_TUPLE_WRITTEN = 17;
  AUDIT_ACTION_TUPLE_DELETED = 18;
  AUDIT_ACTION_CLIENT_UPDATED = 19;
  AUDIT_ACTION_CLIENT_DELETED = 20;
  AUDIT_ACTION_BULK_USERS_CREATED = 21;
  AUDIT_ACTION_BULK_USERS_DISABLED = 22;
  AUDIT_ACTION_ORG_CREATED = 23;
  AUDIT_ACTION_ORG_UPDATED = 24;
  AUDIT_ACTION_ORG_DELETED = 25;
  AUDIT_ACTION_CONSENT_GRANTED = 26;
  AUDIT_ACTION_CONSENT_DENIED = 27;
  AUDIT_ACTION_CONSENT_REVOKED = 28;
  AUDIT_ACTION_FEDERATION_LOGIN_STARTED = 29;
  AUDIT_ACTION_FEDERATION_LOGIN_COMPLETED = 30;
  AUDIT_ACTION_FEDERATION_ACCOUNT_LINKED = 31;
  AUDIT_ACTION_FEDERATION_ACCOUNT_UNLINKED = 32;
  AUDIT_ACTION_FEDERATION_JIT_PROVISIONED = 33;
  AUDIT_ACTION_SAML_LOGIN_INITIATED = 34;
  AUDIT_ACTION_SAML_LOGIN_COMPLETED = 35;
  AUDIT_ACTION_SAML_LOGIN_FAILED = 36;
  AUDIT_ACTION_SAML_IDP_AUTHN_REQUEST_RECEIVED = 37;
  AUDIT_ACTION_SAML_IDP_RESPONSE_ISSUED = 38;
  AUDIT_ACTION_SAML_IDP_INITIATED_SSO = 39;
  AUDIT_ACTION_SAML_SLO_REQUESTED = 40;
  AUDIT_ACTION_SAML_SLO_COMPLETED = 41;
  AUDIT_ACTION_SCIM_USER_CREATED = 42;
  AUDIT_ACTION_SCIM_USER_UPDATED = 43;
  AUDIT_ACTION_SCIM_USER_DELETED = 44;
  AUDIT_ACTION_SCIM_GROUP_CREATED = 45;
  AUDIT_ACTION_SCIM_GROUP_UPDATED = 46;
  AUDIT_ACTION_SCIM_GROUP_DELETED = 47;
}

// A recorded audit event in the append-only log.
message AuditEvent {
  string id = 1;
  string realm_id = 2;
  string actor = 3;
  AuditAction action = 4;
  string resource_type = 5;
  string resource_id = 6;
  int64 timestamp = 7;
  // Optional additional context (JSON-encoded).
  optional string metadata = 8;
  string integrity_hash = 9;
}

// Request to append a new audit event.
message CreateAuditEvent {
  string realm_id = 1;
  string actor = 2;
  AuditAction action = 3;
  string resource_type = 4;
  string resource_id = 5;
  // Optional additional context (JSON-encoded).
  optional string metadata = 6;
}

// Query parameters for filtering audit events.
message AuditQuery {
  string realm_id = 1;
  optional int64 start_time = 2;
  optional int64 end_time = 3;
  optional string actor = 4;
  optional AuditAction action = 5;
  optional uint32 limit = 6;
}

// A page of audit events.
message AuditEventPage {
  repeated AuditEvent events = 1;
}

// Request to verify the integrity hash chain of the realm's audit log.
// Realm context comes from the `x-realm-id` metadata (admin interceptor).
message VerifyIntegrityRequest {}

// Result of an integrity check. `ok = true` means the hash chain verified
// end-to-end; `ok = false` indicates a broken link at `broken_at_event_id`.
message VerifyIntegrityResponse {
  bool ok = 1;
  optional string broken_at_event_id = 2;
  uint64 event_count = 3;
}

service AuditService {
  rpc ListEvents(AuditQuery) returns (AuditEventPage);
  rpc VerifyIntegrity(VerifyIntegrityRequest) returns (VerifyIntegrityResponse);
}
