{% extends "ui/_layout.html" %}
{% block title %}Hearth · Set new password{% endblock %}
{% block body %}
<div class="rounded-md bg-graphite-800 p-8 ring-1 ring-white/6">
  <div class="mb-6 flex items-center justify-center gap-2.5">
    <img src="{{ logo_url }}" alt="{{ product_name }}" class="w-24">
  </div>

  <h1 class="mb-6 text-center text-lg font-semibold text-graphite-50">Set a new password</h1>

  {% match error %}
    {% when Some with (msg) %}
      <div class="mb-4 rounded-lg bg-danger/[0.12] px-4 py-3 text-sm font-medium text-danger-fg" role="alert">{{ msg }}</div>
    {% when None %}
  {% endmatch %}

  <form method="post" action="/ui/reset-password" class="space-y-4">
    <input type="hidden" name="token" value="{{ token }}">

    <div>
      <label for="password" class="block text-sm font-medium text-graphite-300">New password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password"
             class="mt-1 block w-full rounded-sm border border-white/10 bg-graphite-800 px-3 py-2 text-sm text-graphite-50 placeholder:text-graphite-500 focus:border-ember-gold focus:outline-none focus:shadow-focus">
    </div>

    <div>
      <label for="password_confirm" class="block text-sm font-medium text-graphite-300">Confirm password</label>
      <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password"
             class="mt-1 block w-full rounded-sm border border-white/10 bg-graphite-800 px-3 py-2 text-sm text-graphite-50 placeholder:text-graphite-500 focus:border-ember-gold focus:outline-none focus:shadow-focus">
    </div>

    <button type="submit"
            class="w-full btn-ember rounded px-4 py-2.5 text-sm font-semibold">
      Reset password
    </button>
  </form>
</div>
{% endblock %}
