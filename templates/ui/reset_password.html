{% extends "ui/_layout.html" %}
{% block title %}Hearth · Set new password{% endblock %}
{% block body %}
<div class="rounded-md bg-ht-surface-elevated p-8 ring-1 ring-ht-divider/[0.06]">
  <div class="mb-6 flex items-center justify-center gap-2.5">
    <img src="{{ logo_url }}" alt="{{ product_name }}" class="w-24">
  </div>

  <h1 class="mb-6 text-center text-lg font-semibold text-ht-content-primary">Set a new password</h1>

  {% match error %}
    {% when Some with (msg) %}
      <div class="mb-4 rounded-lg bg-danger/[0.12] px-4 py-3 text-sm font-medium text-danger-fg" role="alert">{{ msg }}</div>
    {% when None %}
  {% endmatch %}

  <form method="post" action="/ui/reset-password" class="space-y-4">
    <input type="hidden" name="token" value="{{ token }}">

    <div>
      <label for="password" class="block text-sm font-medium text-ht-content-secondary">New password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password"
             class="mt-1 block w-full rounded-sm border border-ht-divider/[0.10] bg-ht-surface-elevated px-3 py-2 text-sm text-ht-content-primary placeholder:text-ht-content-muted focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>

    <div>
      <label for="password_confirm" class="block text-sm font-medium text-ht-content-secondary">Confirm password</label>
      <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password"
             class="mt-1 block w-full rounded-sm border border-ht-divider/[0.10] bg-ht-surface-elevated px-3 py-2 text-sm text-ht-content-primary placeholder:text-ht-content-muted focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>

    <button type="submit"
            class="w-full btn-ember rounded px-4 py-2.5 text-sm font-semibold">
      Reset password
    </button>
  </form>
</div>
{% endblock %}
