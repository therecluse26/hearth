{% extends "ui/_layout.html" %}
{% block title %}Hearth · First-run setup{% endblock %}
{% block body %}
<div class="rounded-xl bg-white p-8 shadow-card ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700">
  <div class="mb-6 flex items-center justify-center gap-2.5">
    <svg class="h-7 w-7 text-hearth-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    <span class="text-xl font-semibold text-slate-900 dark:text-white">Hearth</span>
  </div>

  <h1 class="mb-2 text-center text-lg font-semibold text-slate-900 dark:text-white">Welcome to Hearth</h1>
  <p class="mb-6 text-center text-sm text-slate-500 dark:text-slate-400">Create your first admin account to get started.</p>

  {% match error %}
    {% when Some with (msg) %}
      <div class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-800 dark:bg-red-900/30 dark:text-red-400" role="alert">{{ msg }}</div>
    {% when None %}
  {% endmatch %}

  <form method="post" action="/ui/setup" autocomplete="off" class="space-y-4">
    <input type="hidden" name="token" value="{{ token }}">

    <div>
      <label for="admin_display_name" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Your display name</label>
      <input type="text" id="admin_display_name" name="admin_display_name" required
             class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-hearth-500 focus:outline-none focus:ring-2 focus:ring-hearth-500/20 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:border-hearth-400 dark:focus:ring-hearth-400/20">
    </div>

    <div>
      <label for="admin_email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
      <input type="email" id="admin_email" name="admin_email" required autocomplete="email"
             class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-hearth-500 focus:outline-none focus:ring-2 focus:ring-hearth-500/20 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:border-hearth-400 dark:focus:ring-hearth-400/20">
    </div>

    <div>
      <label for="admin_password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password <span class="font-normal text-slate-400">(min 12 characters)</span></label>
      <input type="password" id="admin_password" name="admin_password" required minlength="12" autocomplete="new-password"
             class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-hearth-500 focus:outline-none focus:ring-2 focus:ring-hearth-500/20 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:border-hearth-400 dark:focus:ring-hearth-400/20">
    </div>

    <button type="submit"
            class="w-full rounded-lg bg-hearth-500 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-hearth-600 focus:outline-none focus:ring-2 focus:ring-hearth-500/50 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
      Create admin account
    </button>
  </form>
</div>
{% endblock %}
