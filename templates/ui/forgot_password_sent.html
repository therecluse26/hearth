{% extends "ui/_layout.html" %}
{% block title %}Check your email{% endblock %}
{% block body %}
<div class="rounded-xl bg-white p-8 shadow-card ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700">
  <div class="mb-4 flex justify-center">
    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30">
      <svg class="h-6 w-6 text-green-600 dark:text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>

  <h1 class="mb-2 text-center text-lg font-semibold text-slate-900 dark:text-white">Check your email</h1>
  <p class="mb-4 text-center text-sm text-slate-600 dark:text-slate-300">If an account exists with that email address, we've sent a link to reset your password. The link expires in 30 minutes.</p>

  <div class="mt-6 text-center">
    <a href="/ui/login" class="text-sm font-medium text-hearth-500 hover:text-hearth-600 dark:text-hearth-400 dark:hover:text-hearth-300">Back to sign in</a>
  </div>
</div>
{% endblock %}
