{% extends "ui/_layout.html" %}
{% block title %}Verification link invalid{% endblock %}
{% block body %}
<div class="rounded-xl bg-white p-8 shadow-card ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700">
  <div class="mb-4 flex justify-center">
    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-red-100 dark:bg-red-900/30">
      <svg class="h-6 w-6 text-red-600 dark:text-red-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
  </div>

  <h1 class="mb-2 text-center text-lg font-semibold text-slate-900 dark:text-white">{{ heading }}</h1>
  <p class="text-center text-sm text-slate-600 dark:text-slate-300">{{ message }}</p>
</div>
{% endblock %}
