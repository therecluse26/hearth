{% extends "ui/_layout.html" %}
{% block title %}Verification link invalid{% endblock %}
{% block body %}
<div class="rounded-md bg-graphite-800 p-8 ring-1 ring-white/6">
  <div class="mb-4 flex justify-center">
    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-danger/[0.12]">
      <svg class="h-6 w-6 text-danger-fg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
  </div>

  <h1 class="mb-2 text-center text-lg font-semibold text-graphite-50">{{ heading }}</h1>
  <p class="text-center text-sm text-graphite-300">{{ message }}</p>
</div>
{% endblock %}
