{% for app in applications %}
<tr class="border-b border-slate-100 dark:border-slate-700/50">
  <td class="px-4 py-3">
    <a href="/ui/admin/applications/{{ app.client_id().as_uuid() }}" class="text-sm font-medium text-hearth-600 hover:text-hearth-700 dark:text-hearth-400 dark:hover:text-hearth-300">{{ app.client_name() }}</a>
  </td>
  <td class="px-4 py-3">
    <code class="rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-600 dark:bg-slate-700 dark:text-slate-300">{{ app.client_id().as_uuid() }}</code>
  </td>
  <td class="px-4 py-3">
    {% if app.is_confidential() %}
      <span class="inline-flex items-center rounded-full bg-blue-100 px-2 py-0.5 text-xs font-medium text-blue-800 dark:bg-blue-900/30 dark:text-blue-400">Confidential</span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-600 dark:bg-slate-700 dark:text-slate-400">Public</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right">
    <a href="/ui/admin/applications/{{ app.client_id().as_uuid() }}/edit" class="text-sm text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300">Edit</a>
  </td>
</tr>
{% endfor %}
{% if applications.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-slate-400 dark:text-slate-500">No applications registered.</td></tr>
{% endif %}
