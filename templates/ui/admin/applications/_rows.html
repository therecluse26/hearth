{% for app in applications %}
<tr class="border-b border-ht-divider/[0.06]">
  <td class="px-4 py-3">
    <a href="/ui/admin/applications/{{ app.client_id().as_uuid() }}" class="text-sm font-medium text-ht-content-brand hover:text-ht-brand-deep">{{ app.client_name() }}</a>
  </td>
  <td class="px-4 py-3">
    <code class="rounded-sm bg-ht-surface-elevated px-1.5 py-0.5 font-mono text-xs text-ht-content-secondary">{{ app.client_id().as_uuid() }}</code>
  </td>
  <td class="px-4 py-3">
    {% if app.is_confidential() %}
      <span class="inline-flex items-center rounded-full bg-teal-bg px-2 py-0.5 text-xs font-medium text-teal-fg">Confidential</span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-ht-surface-elevated px-2 py-0.5 text-xs font-medium text-ht-content-muted">Public</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right">
    <a href="/ui/admin/applications/{{ app.client_id().as_uuid() }}/edit" class="text-sm text-ht-content-muted hover:text-ht-content-secondary">Edit</a>
  </td>
</tr>
{% endfor %}
{% if applications.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-ht-content-muted">No applications registered.</td></tr>
{% endif %}
