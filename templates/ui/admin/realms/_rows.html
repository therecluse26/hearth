{% for t in realms %}
<tr class="border-b border-divider-subtle">
  <td class="px-4 py-3">
    <a href="/ui/admin/realms/{{ t.id().as_uuid() }}" class="text-sm font-medium text-ht-content-brand hover:text-ht-brand-deep">{{ t.name() }}</a>
  </td>
  <td class="px-4 py-3">
    {% if t.status()|fmt("{:?}") == "Active" %}
      <span class="inline-flex items-center rounded-full bg-success/[0.12] px-2 py-0.5 text-xs font-medium text-success-fg">Active</span>
    {% else if t.status()|fmt("{:?}") == "Archived" %}
      <span class="inline-flex items-center rounded-full bg-steel-bg px-2 py-0.5 text-xs font-medium text-steel-fg">Archived</span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-warning/[0.12] px-2 py-0.5 text-xs font-medium text-warning-fg">Suspended</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right text-sm text-ht-content-muted">
    Configured in hearth.yaml
  </td>
</tr>
{% endfor %}
{% if realms.is_empty() %}
<tr><td colspan="3" class="px-4 py-8 text-center text-sm text-ht-content-muted">No realms found.</td></tr>
{% endif %}
