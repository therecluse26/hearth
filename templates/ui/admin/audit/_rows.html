{% for row in events %}
<tr class="border-b border-white/6">
  <td class="whitespace-nowrap px-4 py-3 text-sm text-graphite-400">{{ row.timestamp_display }}</td>
  <td class="px-4 py-3">
    <code class="rounded-sm bg-graphite-700 px-1.5 py-0.5 font-mono text-xs text-graphite-300">{{ row.event.action }}</code>
  </td>
  <td class="px-4 py-3">
    <code class="font-mono text-xs text-graphite-300">{{ row.event.actor }}</code>
  </td>
  <td class="px-4 py-3 text-sm text-graphite-300">
    {{ row.event.resource_type }}
    <code class="ml-1 rounded-sm bg-graphite-700 px-1.5 py-0.5 font-mono text-xs">{{ row.event.resource_id }}</code>
  </td>
</tr>
{% endfor %}
{% if events.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-graphite-500">No audit events found.</td></tr>
{% endif %}
