{% for row in events %}
<tr class="border-b border-slate-100 dark:border-slate-700/50">
  <td class="whitespace-nowrap px-4 py-3 text-sm text-slate-500 dark:text-slate-400">{{ row.timestamp_display }}</td>
  <td class="px-4 py-3">
    <code class="rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-700 dark:bg-slate-700 dark:text-slate-300">{{ row.event.action }}</code>
  </td>
  <td class="px-4 py-3">
    <code class="text-xs text-slate-600 dark:text-slate-300">{{ row.event.actor }}</code>
  </td>
  <td class="px-4 py-3 text-sm text-slate-600 dark:text-slate-300">
    {{ row.event.resource_type }}
    <code class="ml-1 rounded bg-slate-100 px-1.5 py-0.5 text-xs dark:bg-slate-700">{{ row.event.resource_id }}</code>
  </td>
</tr>
{% endfor %}
{% if events.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-slate-400 dark:text-slate-500">No audit events found.</td></tr>
{% endif %}
