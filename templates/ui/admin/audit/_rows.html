{% for row in events %}
<tr class="border-b border-divider-subtle">
  <td class="whitespace-nowrap px-4 py-3 text-sm text-ht-content-muted">{{ row.timestamp_display }}</td>
  <td class="px-4 py-3">
    <code class="rounded-sm bg-ht-surface-elevated px-1.5 py-0.5 font-mono text-xs text-ht-content-secondary">{{ row.event.action }}</code>
  </td>
  <td class="px-4 py-3 text-sm text-ht-content-secondary" title="{{ row.event.actor }}">
    {{ row.actor_display }}
  </td>
  <td class="px-4 py-3 text-sm text-ht-content-secondary" title="{{ row.event.resource_id }}">
    <span class="text-ht-content-muted">{{ row.event.resource_type }}</span>
    <span class="ml-1">{{ row.resource_display }}</span>
  </td>
</tr>
{% endfor %}
{% if events.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-ht-content-muted">No audit events found.</td></tr>
{% endif %}
