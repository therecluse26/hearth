{% extends "ui/_layout.html" %}
{% block title %}Hearth · Audit Log{% endblock %}
{% block body %}
<div class="mb-6">
  <h1 class="text-2xl font-semibold text-ht-content-primary">Audit log</h1>
</div>

{# Filter form #}
<div class="mb-6 rounded-md bg-ht-surface-elevated p-4 ring-1 ring-ht-divider/[0.06]">
  <form method="get" action="/ui/admin/audit"
        hx-get="/ui/admin/audit" hx-target="#table-body" hx-swap="innerHTML"
        hx-indicator="#audit-spinner"
        class="flex flex-wrap items-end gap-4">
    <div class="min-w-0 flex-1">
      <label for="actor" class="block text-xs font-medium text-ht-content-muted">Actor</label>
      <input type="text" id="actor" name="actor" value="{{ form_actor }}" placeholder="user UUID or 'system'"
             class="mt-1 block w-full rounded border border-strong bg-ht-surface-base px-3 py-1.5 text-sm text-ht-content-primary focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>
    <div class="min-w-0 flex-1">
      <label for="action" class="block text-xs font-medium text-ht-content-muted">Action</label>
      <input type="text" id="action" name="action" value="{{ form_action }}" placeholder="e.g. user_created"
             class="mt-1 block w-full rounded border border-strong bg-ht-surface-base px-3 py-1.5 text-sm text-ht-content-primary focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>
    <div class="w-24">
      <label for="limit" class="block text-xs font-medium text-ht-content-muted">Limit</label>
      <input type="number" id="limit" name="limit" value="{{ form_limit }}" min="1" max="200"
             class="mt-1 block w-full rounded border border-strong bg-ht-surface-base px-3 py-1.5 text-sm text-ht-content-primary focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>
    <div class="flex items-center gap-2">
      <button type="submit"
              class="btn-ember rounded px-4 py-1.5 text-sm font-semibold">
        Filter
      </button>
      <div id="audit-spinner" class="htmx-indicator">
        <div class="h-4 w-4 animate-spinner rounded-full border-2 border-ht-divider/[0.20] border-t-ht-content-brand"></div>
      </div>
    </div>
  </form>
</div>

<div class="overflow-hidden rounded-md bg-ht-surface-elevated ring-1 ring-ht-divider/[0.06]">
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="border-b border-ht-divider/[0.10] bg-ht-surface-elevated">
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Time</th>
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Action</th>
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Actor</th>
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Resource</th>
        </tr>
      </thead>
      <tbody id="table-body">
        {% include "ui/admin/audit/_rows.html" %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
