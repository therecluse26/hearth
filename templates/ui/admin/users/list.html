{% extends "ui/_layout.html" %}
{% block title %}Hearth · Users{% endblock %}
{% block body %}
<div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
  <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Users</h1>
  <a href="/ui/admin/users/new"
     class="inline-flex items-center gap-1.5 rounded-lg bg-hearth-500 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-hearth-600 focus:outline-none focus:ring-2 focus:ring-hearth-500/50 focus:ring-offset-2 dark:focus:ring-offset-slate-900">
    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Create user
  </a>
</div>

<div class="overflow-hidden rounded-xl bg-white shadow-card ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700">
  <table class="w-full">
    <thead>
      <tr class="border-b border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-800/50">
        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Email</th>
        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Name</th>
        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Status</th>
        <th class="px-4 py-3"></th>
      </tr>
    </thead>
    <tbody id="table-body">
      {% include "ui/admin/users/_rows.html" %}
    </tbody>
  </table>
</div>

{% match next_cursor %}
  {% when Some with (cursor) %}
    <nav class="mt-4 flex justify-end">
      <a href="/ui/admin/users?cursor={{ cursor }}"
         class="inline-flex items-center gap-1 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
        Next page
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </nav>
  {% when None %}
{% endmatch %}
{% endblock %}
