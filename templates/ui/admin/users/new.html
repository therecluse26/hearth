{% extends "ui/_layout.html" %}
{% block title %}Hearth · Create User{% endblock %}
{% block body %}
<div class="mb-6">
  <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Create user</h1>
</div>

<div class="rounded-xl bg-white p-6 shadow-card ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700">
  {% match error %}
    {% when Some with (msg) %}
      <div class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-800 dark:bg-red-900/30 dark:text-red-400" role="alert">{{ msg }}</div>
    {% when None %}
  {% endmatch %}

  <form method="post" action="/ui/admin/users/new" autocomplete="off" class="space-y-4">
    {% match csrf %}
      {% when Some with (token) %}
        <input type="hidden" name="_csrf" value="{{ token }}">
      {% when None %}
    {% endmatch %}

    <div>
      <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
      <input type="email" id="email" name="email" required value="{{ form_email }}"
             class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-hearth-500 focus:outline-none focus:ring-2 focus:ring-hearth-500/20 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:border-hearth-400 dark:focus:ring-hearth-400/20">
    </div>

    <div>
      <label for="display_name" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Display name</label>
      <input type="text" id="display_name" name="display_name" required value="{{ form_display_name }}"
             class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-hearth-500 focus:outline-none focus:ring-2 focus:ring-hearth-500/20 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:border-hearth-400 dark:focus:ring-hearth-400/20">
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Initial password</label>
      <input type="password" id="password" name="password" required minlength="12" autocomplete="new-password"
             class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-hearth-500 focus:outline-none focus:ring-2 focus:ring-hearth-500/20 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:border-hearth-400 dark:focus:ring-hearth-400/20">
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="rounded-lg bg-hearth-500 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-hearth-600 focus:outline-none focus:ring-2 focus:ring-hearth-500/50 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
        Create user
      </button>
      <a href="/ui/admin/users" class="text-sm font-medium text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
