{% extends "ui/_layout.html" %}
{% block title %}Hearth · Create User{% endblock %}
{% block body %}
<header class="hearth-page-header">
  <h1>Create user</h1>
</header>

{% match error %}
  {% when Some with (msg) %}
    <div class="hearth-flash hearth-flash--error" role="alert">{{ msg }}</div>
  {% when None %}
{% endmatch %}

<form method="post" action="/ui/admin/users/new" autocomplete="off">
  {% match csrf %}
    {% when Some with (token) %}
      <input type="hidden" name="_csrf" value="{{ token }}">
    {% when None %}
  {% endmatch %}

  <label for="email">Email</label>
  <input type="email" id="email" name="email" required
         value="{{ form_email }}">

  <label for="display_name">Display name</label>
  <input type="text" id="display_name" name="display_name" required
         value="{{ form_display_name }}">

  <label for="password">Initial password</label>
  <input type="password" id="password" name="password" required
         minlength="12" autocomplete="new-password">

  <div class="hearth-actions">
    <button type="submit">Create user</button>
    <a href="/ui/admin/users">Cancel</a>
  </div>
</form>
{% endblock %}
