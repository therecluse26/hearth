{% extends "ui/_layout.html" %}
{% block title %}Hearth · Create User{% endblock %}
{% block body %}
<div class="mb-6">
  <h1 class="font-display text-2xl font-medium text-ht-content-primary">Create user</h1>
</div>

<div class="rounded-md bg-ht-surface-elevated p-6 ring-1 ring-white/6">
  {% match error %}
    {% when Some with (msg) %}
      <div class="mb-4 rounded-lg bg-danger/[0.12] px-4 py-3 text-sm font-medium text-danger-fg" role="alert">{{ msg }}</div>
    {% when None %}
  {% endmatch %}

  <form method="post" action="/ui/admin/users/new" autocomplete="off" class="space-y-4">
    {% match csrf %}
      {% when Some with (token) %}
        <input type="hidden" name="_csrf" value="{{ token }}">
      {% when None %}
    {% endmatch %}

    <div>
      <label for="email" class="block text-sm font-medium text-ht-content-secondary">Email</label>
      <input type="email" id="email" name="email" required value="{{ form_email }}"
             class="mt-1 block w-full rounded-sm border border-ht-divider/[0.10] bg-ht-surface-elevated px-3 py-2 text-sm text-ht-content-primary focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>

    <div>
      <label for="display_name" class="block text-sm font-medium text-ht-content-secondary">Display name</label>
      <input type="text" id="display_name" name="display_name" required value="{{ form_display_name }}"
             class="mt-1 block w-full rounded-sm border border-ht-divider/[0.10] bg-ht-surface-elevated px-3 py-2 text-sm text-ht-content-primary focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-ht-content-secondary">Initial password</label>
      <input type="password" id="password" name="password" required minlength="12" autocomplete="new-password"
             class="mt-1 block w-full rounded-sm border border-ht-divider/[0.10] bg-ht-surface-elevated px-3 py-2 text-sm text-ht-content-primary focus:border-ht-content-brand focus:outline-none focus:shadow-focus">
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="btn-ember rounded px-4 py-2 text-sm font-semibold">
        Create user
      </button>
      <a href="/ui/admin/users" class="text-sm font-medium text-ht-content-muted hover:text-ht-content-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
