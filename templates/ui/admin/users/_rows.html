{% for user in users %}
<tr class="border-b border-slate-100 dark:border-slate-700/50">
  <td class="px-4 py-3">
    <a href="/ui/admin/users/{{ user.id().as_uuid() }}" class="text-sm font-medium text-hearth-600 hover:text-hearth-700 dark:text-hearth-400 dark:hover:text-hearth-300">{{ user.email() }}</a>
  </td>
  <td class="px-4 py-3 text-sm text-slate-600 dark:text-slate-300">{{ user.display_name() }}</td>
  <td class="px-4 py-3">
    {% if user.status()|fmt("{:?}") == "Active" %}
      <span class="inline-flex items-center rounded-full bg-green-100 px-2 py-0.5 text-xs font-medium text-green-800 dark:bg-green-900/30 dark:text-green-400">Active</span>
    {% else if user.status()|fmt("{:?}") == "Disabled" %}
      <span class="inline-flex items-center rounded-full bg-red-100 px-2 py-0.5 text-xs font-medium text-red-800 dark:bg-red-900/30 dark:text-red-400">Disabled</span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-yellow-100 px-2 py-0.5 text-xs font-medium text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400">Pending</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right">
    <a href="/ui/admin/users/{{ user.id().as_uuid() }}/edit" class="text-sm text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300">Edit</a>
  </td>
</tr>
{% endfor %}
{% if users.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-slate-400 dark:text-slate-500">No users found.</td></tr>
{% endif %}
