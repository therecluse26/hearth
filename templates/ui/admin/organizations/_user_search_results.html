{# HTMX partial: user search results for the member-add form #}
{% if users.is_empty() %}
  {% if query.len() >= 2 %}
  <div class="px-3 py-3 text-sm text-slate-500 dark:text-slate-400">
    No users found.
    <button type="button"
            @click="showInviteModal = true; inviteEmail = searchQuery; showDropdown = false"
            class="ml-1 text-hearth-600 hover:text-hearth-700 underline dark:text-hearth-400 dark:hover:text-hearth-300">
      Invite "{{ query }}" instead?
    </button>
  </div>
  {% endif %}
{% else %}
  {% for u in users %}
  <button type="button"
          @click="selectedUser = { id: '{{ u.id().as_uuid() }}', name: '{{ u.display_name() }}', email: '{{ u.email() }}' }; showDropdown = false"
          class="flex w-full items-center gap-3 px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-700">
    <div class="min-w-0 flex-1">
      <div class="truncate font-medium text-slate-900 dark:text-white">{{ u.display_name() }}</div>
      <div class="truncate text-xs text-slate-500 dark:text-slate-400">{{ u.email() }}</div>
    </div>
  </button>
  {% endfor %}
{% endif %}
