{# HTMX partial: user search results for the member-add form #}
{% if users.is_empty() %}
  {% if query.len() >= 2 %}
  <div class="px-3 py-3 text-sm text-ht-content-muted">
    No users found.
    <button type="button"
            @click="showInviteModal = true; inviteEmail = searchQuery; showDropdown = false"
            class="ml-1 text-ht-content-brand hover:text-ht-brand-deep underline">
      Invite "{{ query }}" instead?
    </button>
  </div>
  {% endif %}
{% else %}
  {% for u in users %}
  <button type="button"
          @click="selectedUser = { id: '{{ u.id().as_uuid() }}', name: '{{ u.display_name() }}', email: '{{ u.email() }}' }; showDropdown = false"
          class="flex w-full items-center gap-3 px-3 py-2 text-left text-sm hover-bg-divider">
    <div class="min-w-0 flex-1">
      <div class="truncate font-medium text-ht-content-primary">{{ u.display_name() }}</div>
      <div class="truncate text-xs text-ht-content-muted">{{ u.email() }}</div>
    </div>
  </button>
  {% endfor %}
{% endif %}
