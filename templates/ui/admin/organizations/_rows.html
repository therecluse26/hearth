{% for o in organizations %}
<tr class="border-b border-ht-divider/[0.06]">
  <td class="px-4 py-3">
    <a href="/ui/admin/organizations/{{ o.id().as_uuid() }}" class="text-sm font-medium text-ht-content-brand hover:text-ht-brand-deep">{{ o.name() }}</a>
  </td>
  <td class="px-4 py-3">
    <code class="rounded-sm bg-ht-surface-elevated px-1.5 py-0.5 font-mono text-xs text-ht-content-secondary">{{ o.slug() }}</code>
  </td>
  <td class="px-4 py-3">
    {% if o.status()|fmt("{:?}") == "Active" %}
      <span class="inline-flex items-center rounded-full bg-success/[0.12] px-2 py-0.5 text-xs font-medium text-success-fg">Active</span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-warning/[0.12] px-2 py-0.5 text-xs font-medium text-warning-fg">Suspended</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right">
    <a href="/ui/admin/organizations/{{ o.id().as_uuid() }}/edit" class="text-sm text-ht-content-muted hover:text-ht-content-secondary">Edit</a>
  </td>
</tr>
{% endfor %}
{% if organizations.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-ht-content-muted">No organizations found.</td></tr>
{% endif %}
