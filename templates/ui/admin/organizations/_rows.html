{% for o in organizations %}
<tr class="border-b border-white/6">
  <td class="px-4 py-3">
    <a href="/ui/admin/organizations/{{ o.id().as_uuid() }}" class="text-sm font-medium text-ember-gold hover:text-ember-orange">{{ o.name() }}</a>
  </td>
  <td class="px-4 py-3">
    <code class="rounded-sm bg-graphite-700 px-1.5 py-0.5 font-mono text-xs text-graphite-300">{{ o.slug() }}</code>
  </td>
  <td class="px-4 py-3">
    {% if o.status()|fmt("{:?}") == "Active" %}
      <span class="inline-flex items-center rounded-full bg-success/[0.12] px-2 py-0.5 text-xs font-medium text-success-fg">Active</span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-warning/[0.12] px-2 py-0.5 text-xs font-medium text-warning-fg">Suspended</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right">
    <a href="/ui/admin/organizations/{{ o.id().as_uuid() }}/edit" class="text-sm text-graphite-400 hover:text-graphite-300">Edit</a>
  </td>
</tr>
{% endfor %}
{% if organizations.is_empty() %}
<tr><td colspan="4" class="px-4 py-8 text-center text-sm text-graphite-500">No organizations found.</td></tr>
{% endif %}
