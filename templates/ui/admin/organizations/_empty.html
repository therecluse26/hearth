{# Empty state for the organizations list within a realm.
   Rust handler vars: realm_name: String #}
<div class="flex flex-col items-center justify-center py-16 text-center">
  <div class="mb-4 flex h-14 w-14 items-center justify-center rounded-xl bg-ht-surface-elevated ring-1 ring-divider-subtle">
    <svg class="h-7 w-7 text-ht-content-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <h3 class="font-display text-lg font-medium text-ht-content-primary">No organizations yet</h3>
  <p class="mt-2 max-w-sm text-sm text-ht-content-muted">
    Organizations are B2B customer groups — they share roles, RBAC assignments, and a shared audit history inside this realm.
  </p>
  <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
    <a href="/ui/admin/realms/{{ realm_name }}/organizations/new"
       class="btn-ember rounded px-4 py-2 text-sm font-semibold">
      <svg class="mr-1.5 inline-block h-4 w-4 align-[-2px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create your first organization
    </a>
  </div>
</div>
