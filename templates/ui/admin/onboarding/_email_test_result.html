{# HTMX partial — replaces #email-test-result on test send.
   Rust handler vars: success: bool, message: String #}
{% if success %}
<div id="email-test-result"
     class="flex items-start gap-3 rounded-md bg-success/[0.10] px-4 py-3 text-sm text-ht-content-secondary ring-1 ring-success/[0.20]"
     role="status">
  <svg class="mt-0.5 h-4 w-4 shrink-0 text-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span>{{ message }}</span>
</div>
{% else %}
<div id="email-test-result"
     class="flex items-start gap-3 rounded-md bg-danger/[0.10] px-4 py-3 text-sm text-ht-content-secondary ring-1 ring-danger/[0.20]"
     role="alert">
  <svg class="mt-0.5 h-4 w-4 shrink-0 text-danger-fg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
  <div>
    <p class="font-medium text-danger-fg">Delivery failed</p>
    <p class="mt-0.5 text-ht-content-muted">{{ message }}</p>
    <a href="/ui/admin/settings/editor?section=email"
       class="mt-1 inline-block text-xs text-ht-content-brand hover:underline">Check email transport settings →</a>
  </div>
</div>
{% endif %}
