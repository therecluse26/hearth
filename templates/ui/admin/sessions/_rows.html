{% for s in sessions %}
<tr class="border-b border-slate-100 dark:border-slate-700/50" id="session-{{ s.session.id().as_uuid() }}">
  <td class="px-4 py-3">
    <code class="rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-600 dark:bg-slate-700 dark:text-slate-300">{{ s.session.id().as_uuid() }}</code>
  </td>
  <td class="px-4 py-3 text-sm text-slate-600 dark:text-slate-300">{{ s.user_email }}</td>
  <td class="px-4 py-3 text-sm text-slate-500 dark:text-slate-400">{{ s.created_at_display }}</td>
  <td class="px-4 py-3 text-sm text-slate-500 dark:text-slate-400">{{ s.expires_at_display }}</td>
  <td class="px-4 py-3 text-right">
    <form method="post" action="/ui/admin/sessions/{{ s.session.id().as_uuid() }}/revoke"
          hx-post="/ui/admin/sessions/{{ s.session.id().as_uuid() }}/revoke"
          hx-target="#session-{{ s.session.id().as_uuid() }}"
          hx-swap="outerHTML"
          onsubmit="if(!this.hasAttribute('hx-post'))return confirm('Revoke this session?');">
      {% match csrf %}
        {% when Some with (token) %}
          <input type="hidden" name="_csrf" value="{{ token }}">
        {% when None %}
      {% endmatch %}
      <button type="submit"
              class="rounded-md bg-red-50 px-2.5 py-1 text-xs font-semibold text-red-700 hover:bg-red-100 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50">
        Revoke
      </button>
    </form>
  </td>
</tr>
{% endfor %}
{% if sessions.is_empty() %}
<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-slate-400 dark:text-slate-500">No active sessions.</td></tr>
{% endif %}
