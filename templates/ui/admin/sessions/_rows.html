{% for s in sessions %}
<tr class="border-b border-white/6" id="session-{{ s.session.id().as_uuid() }}">
  <td class="px-4 py-3">
    <code class="rounded-sm bg-graphite-700 px-1.5 py-0.5 font-mono text-xs text-graphite-300">{{ s.session.id().as_uuid() }}</code>
  </td>
  <td class="px-4 py-3 text-sm text-graphite-300">{{ s.user_email }}</td>
  <td class="px-4 py-3 text-sm text-graphite-400">{{ s.created_at_display }}</td>
  <td class="px-4 py-3 text-sm text-graphite-400">{{ s.expires_at_display }}</td>
  <td class="px-4 py-3 text-right">
    <form method="post" action="/ui/admin/sessions/{{ s.session.id().as_uuid() }}/revoke"
          hx-post="/ui/admin/sessions/{{ s.session.id().as_uuid() }}/revoke"
          hx-target="#session-{{ s.session.id().as_uuid() }}"
          hx-swap="outerHTML"
          onsubmit="if(!this.hasAttribute('hx-post'))return confirm('Revoke this session?');">
      {% match csrf %}
        {% when Some with (token) %}
          <input type="hidden" name="_csrf" value="{{ token }}">
        {% when None %}
      {% endmatch %}
      <button type="submit"
              class="rounded-md bg-danger/[0.12] px-2.5 py-1 text-xs font-semibold text-danger-fg hover:bg-danger/[0.2]">
        Revoke
      </button>
    </form>
  </td>
</tr>
{% endfor %}
{% if sessions.is_empty() %}
<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-graphite-500">No active sessions.</td></tr>
{% endif %}
