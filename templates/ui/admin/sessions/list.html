{% extends "ui/_layout.html" %}
{% block title %}Hearth · Sessions{% endblock %}
{% block body %}
<div class="mb-6">
  <h1 class="text-2xl font-semibold text-ht-content-primary">Sessions</h1>
</div>

<div class="overflow-hidden rounded-md bg-ht-surface-elevated ring-1 ring-white/6">
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="border-b border-ht-divider/[0.10] bg-ht-surface-elevated">
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Session ID</th>
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">User</th>
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Created</th>
          <th class="px-4 py-3 text-left font-mono text-xs font-medium uppercase tracking-[0.12em] text-ht-content-muted">Expires</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody id="table-body">
        {% include "ui/admin/sessions/_rows.html" %}
      </tbody>
    </table>
  </div>
</div>

{% match next_cursor %}
  {% when Some with (cursor) %}
    <nav class="mt-4 flex justify-end">
      <a href="/ui/admin/sessions?cursor={{ cursor }}"
         class="inline-flex items-center gap-1 rounded border border-strong bg-ht-surface-elevated px-3 py-1.5 text-sm font-medium text-ht-content-secondary hover:bg-ht-divider/[0.07]">
        Next page
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </nav>
  {% when None %}
{% endmatch %}
{% endblock %}
