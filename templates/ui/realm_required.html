{% extends "ui/_layout.html" %}
{% block title %}Sign-in URL required{% endblock %}
{% block body %}
<div class="rounded-md bg-ht-surface-elevated p-8 ring-1 ring-divider-subtle">
  <div class="mb-4 flex justify-center">
    <img src="{{ logo_url }}" alt="{{ product_name }}" class="w-24">
  </div>

  <h1 class="mb-2 text-center text-lg font-semibold text-ht-content-primary">Sign-in URL required</h1>
  <p class="mb-4 text-center text-sm text-ht-content-secondary">This server requires an explicit realm in the URL. Contact your administrator for the correct sign-in link.</p>
</div>
{% endblock %}
