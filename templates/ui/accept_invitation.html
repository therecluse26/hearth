{% extends "ui/_layout.html" %}
{% block title %}Hearth · Invitation{% endblock %}
{% block body %}
<div class="mx-auto max-w-md">
  {% if success %}
  <div class="rounded-md bg-ht-surface-elevated p-8 ring-1 ring-divider-subtle text-center">
    <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-success/[0.12]">
      <svg class="h-6 w-6 text-success-fg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="font-display text-xl font-medium text-ht-content-primary">You've joined {{ org_name }}!</h1>
    <p class="mt-2 text-sm text-ht-content-muted">Your membership is now active.</p>
    <a href="{{ login_url }}" class="mt-6 inline-block btn-ember rounded px-6 py-2 text-sm font-semibold">
      Go to login
    </a>
  </div>
  {% else %}
  <div class="rounded-md bg-ht-surface-elevated p-8 ring-1 ring-divider-subtle text-center">
    <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-danger/[0.12]">
      <svg class="h-6 w-6 text-danger-fg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <h1 class="font-display text-xl font-medium text-ht-content-primary">Invalid invitation</h1>
    <p class="mt-2 text-sm text-ht-content-muted">{{ error_message }}</p>
    <a href="{{ login_url }}" class="mt-6 inline-block rounded border border-strong bg-ht-surface-elevated px-6 py-2 text-sm font-medium text-ht-content-secondary hover-bg-divider">
      Go to login
    </a>
  </div>
  {% endif %}
</div>
{% endblock %}
