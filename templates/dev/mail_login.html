<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hearth Mailcatcher · Sign in</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/ui/static/app.css">
</head>
<body class="flex min-h-screen items-center justify-center bg-ht-surface-base">
  <div class="w-full max-w-sm rounded-lg bg-ht-surface-elevated p-8 ring-1 ring-white/6">
    <div class="mb-6 text-center">
      <h1 class="font-display text-xl font-semibold text-ht-content-primary">Mailcatcher Inbox</h1>
      <p class="mt-1 text-sm text-ht-content-muted">Dev-mode email capture</p>
    </div>

    {% match error %}
      {% when Some with (msg) %}
        <div class="mb-4 rounded-lg bg-danger/[0.12] px-4 py-3 text-sm text-danger-fg" role="alert">
          <p>{{ msg }}</p>
        </div>
      {% when None %}
    {% endmatch %}

    <form method="post" action="/dev/mail/login" class="space-y-4">
      <div>
        <label for="password" class="block text-sm font-medium text-ht-content-secondary">
          Access password
        </label>
        <input type="password" id="password" name="password" required autofocus
               autocomplete="current-password"
               class="mt-1 block w-full rounded-sm border border-divider bg-ht-surface px-3 py-2 text-sm text-ht-content-primary placeholder:text-ht-content-muted focus:border-strong focus:outline-none focus:shadow-focus">
        <p class="mt-1.5 text-xs text-ht-content-muted">
          Check your terminal output for the access password shown when Hearth started.
        </p>
      </div>
      <button type="submit"
              class="w-full btn-ember rounded px-4 py-2.5 text-sm font-semibold">
        Sign in
      </button>
    </form>

    <div class="mt-6 rounded border border-amber-500/20 bg-amber-500/5 px-3 py-2 text-xs text-amber-300/80">
      <span class="font-semibold">Dev mode only.</span>
      This inbox is not available in production.
    </div>
  </div>
</body>
</html>
