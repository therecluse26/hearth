# compose.dev.yaml — fast dev reload via host-built binary.
#
# NOT auto-loaded. The Makefile's `docker-reload` target passes this file
# explicitly with `-f` flags so the bind mount is only active after a
# successful `cargo build --release` (avoids Docker creating a directory
# placeholder when the binary doesn't exist yet).
#
# Usage:
#   make docker-up       # first time — image build, no mount
#   make docker-reload   # cargo build --release + restart with mount

services:
  hearth:
    volumes:
      - ./target/release/hearth:/usr/local/bin/hearth:ro
