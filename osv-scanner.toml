# osv-scanner / OpenSSF Scorecard vulnerability suppressions for Hearth.
#
# This file is read by:
#   - OpenSSF Scorecard's Vulnerabilities check
#     (.github/workflows/scorecard.yml -> ossf/scorecard-action),
#     which delegates to osv-scanner under the hood.
#   - Any local `osv-scanner` invocation run from the repo root.
#
# Suppressions below are scoped to the smallest possible blast radius: each
# entry covers exactly one GHSA, paired with the structural reason the
# advisory cannot apply to this codebase and the precise condition under
# which the entry should be re-validated.
#
# When adding new entries, prefer fixing the underlying dependency over
# suppressing. Suppressions are reserved for advisories that cannot affect
# this project (e.g. package not present, ecosystem mismatch, exploit path
# unreachable in our usage).
#
# Source of truth for the false-positive analysis: HEA-271 plan document
# (Vulnerability Mitigation Plan) and HEA-285.

# ---------------------------------------------------------------------------
# protobufjs (7 GHSAs) — not a dependency of this project.
#
# Hearth performs all protobuf work in Rust via `prost` / `tonic` (see the
# `proto/` directory and the `proto-check` / `proto-breaking` make targets
# in .github/workflows/ci.yml). The JavaScript `protobufjs` package is not
# present in `package.json` or `package-lock.json`. These advisories cannot
# apply unless protobufjs is introduced as a JS dependency in the future,
# at which point each entry below MUST be re-validated.
# ---------------------------------------------------------------------------

